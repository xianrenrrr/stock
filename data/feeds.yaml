# RSS feeds for news ingestion.
# Per-ticker feeds use {ticker} as a placeholder in the URL.
feeds:
  - url: "https://finance.yahoo.com/rss/headline?s={ticker}"
    source: "yahoo_rss"
    per_ticker: true
  - url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
    source: "marketwatch"
    per_ticker: false
  - url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
    source: "cnbc"
    per_ticker: false
  # SEC EDGAR Atom feed: pass ticker as CIK -- EDGAR resolves ticker->CIK automatically.
  - url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK={ticker}&type=8-K&dateb=&owner=include&count=10&output=atom"
    source: "sec_edgar"
    per_ticker: true
