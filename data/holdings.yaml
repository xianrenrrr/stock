# Tracked portfolio holdings -- single source of truth for the holdings table.
# On orchestrator startup, sync_from_yaml() upserts each row and marks any
# DB-only ticker as inactive. CLI/API mutations write to the DB; ops can edit
# this file manually and the next startup syncs it.

holdings:
  - ticker: SMCI
    qty: 1
    cost_basis: 0.00
    opened_at: '2026-05-04'
    notes: |
      Bought 2026-05-04 on id=24 thesis: DLC liquid-cool rack leader,
      ships GB200 NVL72 1-2 quarters ahead of ODM peers. Half size per
      system caveat (high beta, not high alpha; net margin 5-8%).

      === STOP-LOSS (computed 2026-05-04, F24 helper) ===
      Recommended hard stop: $23.91 (-11.7% from $27.09 close)
        - ATR(20) = $1.59; 2x ATR stop = $23.91
        - 30-day swing-low = $21.34 (worst-case secondary stop)
        - -15% mechanical floor = $23.03
      Re-run anytime: `stock event ...` or just look at the next morning
      research note's 止损参考 / Stop-loss reference table.

      === SELL TRIGGERS (any one = re-evaluate; multiple = exit) ===
      1. Q3 print: margin stuck < 11% -> thesis broken, cut.
      2. Hyperscaler 5月 capex guidance NOT upgraded by MSFT/META/GOOGL/
         AMZN -> integration layer pre-priced; trim half.
      3. GB200 NVL72 shipment cadence delay (NVDA earnings or channel
         check) -> entire integration thesis pushes out -> exit.
      4. Auditor / 10-K compliance event reignites -> unconditional exit.
      5. DELL liquid-cooling rack price war disclosed -> SMCI first-mover
         premium evaporates -> trim 50%.
      6. Single-day pct_change <= -8% on volume_ratio >= 2.0 -> stop-loss
         check (F12 anomaly flagger fires automatically).

      === TAKE-PROFIT TRIGGERS ===
      7. +30% from cost_basis with no new catalyst -> trim 1/3.
      8. META or xAI announces SMCI as DLC vendor of record -> trim 1/2
         + raise stop to entry.

      === RECOMMENDED MAX POSITION SIZE: 5% of portfolio. ===
      One bad quarter = potential 30%+ drawdown.

      UPDATE qty + cost_basis as soon as you have them:
        stock holding add SMCI <real_qty> <real_cost> --notes "..."

