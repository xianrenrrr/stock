# Render blueprint: one web service running both FastAPI (uvicorn) + the APScheduler
# orchestrator in a single process. Persistent disk holds the SQLite DB so research
# notes, predictions, conversations, and rules survive restarts.
#
# Apply via the Render dashboard: New > Blueprint > point at this repo. Render reads
# this file and prompts for the secret env vars below.
#
# Cost estimate (free tier):
#   - 1x web service on `Free` instance: $0/mo (sleeps after 15 min idle -- not ideal)
#   - Recommended: `Starter` instance ($7/mo) so the scheduler runs continuously
#   - 1 GB persistent disk: $0.25/mo
# Total: ~$7.25/mo for always-on.

services:
  - type: web
    name: stock-research
    runtime: docker
    dockerfilePath: ./Dockerfile
    # FREE tier: $0/mo, 512 MB RAM, ephemeral disk, sleeps after 15 min idle.
    # The local laptop pushes to /sync/* every 5 min, which doubles as a
    # keepalive so the free instance never actually sleeps.
    plan: free
    region: oregon
    healthCheckPath: /stock/health
    autoDeploy: true
    envVars:
      # Cloud-proxy mode: no scheduler, no MiniMax/Tavily calls. Render is just
      # a passive cache of the latest research notes + a buffer for boss replies.
      - key: STOCK_MODE
        value: cloud_proxy

      # Render auto-generates this and stores it. Copy from the dashboard and
      # set it as RENDER_SYNC_TOKEN on your laptop's .env so the laptop can
      # authenticate against /sync/*.
      - key: STOCK_API_TOKEN
        generateValue: true

      # SQLite ephemeral location -- /tmp survives within an instance lifetime;
      # local laptop refills it via /sync every 5 min.
      - key: DB_PATH
        value: /tmp/stock.db

      # Cloud-proxy doesn't make LLM/Tavily calls but the modules are still
      # imported. Empty values are safe (Settings load fine).
      - key: MINIMAX_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: TAVILY_API_KEY
        value: ""
      - key: SERPER_API_KEY
        value: ""
      - key: BRAVE_API_KEY
        value: ""

      # Cloud-proxy never delivers via pyautogui or OpenClaw.
      - key: OPENCLAW_AUTO_DELIVER
        value: "false"
      - key: WECHAT_PUSH_URL
        value: ""

      - key: DAILY_COST_CEILING_USD
        value: "10"
      - key: RESEARCH_LANGUAGE
        value: zh

    # No persistent disk -- free tier doesn't support it. State refilled
    # every 5 min by the laptop's /sync push.
